<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestionnaire de mots de passe — Démo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Démo — Gestionnaire de mots de passe</h1>
      <p class="muted">Ceci est une démo UI. Données factices.</p>
    </header>

    <!-- Target (glassified) -->
    <div class="liquidGL">
      <!-- Content (excluded from lens) -->
      <div class="content">
        <section class="card" id="loginCard">
          <h2 style="margin:0 0 4px">Connexion</h2>
          <p class="muted" style="margin:0 0 16px;font-size:13px">Accédez à votre gestionnaire de mots de passe.</p>
          <label class="label">
            Adresse e-mail
            <input type="email" id="loginEmail" placeholder="exemple@domaine.com" autocomplete="email" />
          </label>
          <label class="label">
            Mot de passe
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
          </label>
          <div id="loginError" class="status" style="display:none;border-color:rgba(255,59,107,.35);background:rgba(255,59,107,.10);color:rgba(255,180,180,.9);"></div>
          <div class="row">
            <button id="loginBtn">Se connecter</button>
          </div>
        </section>
      </div>
    </div>

    <div class="liquidGL">
      <div class="content">
        <section class="card hidden" id="appCard">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <h2 style="margin:0">Mes mots de passe</h2>
            <button class="secondary" id="logoutBtn" style="font-size:13px;padding:7px 12px;">Déconnexion</button>
          </div>
          <div class="grid">
            <label class="label">
              Site / Application
              <input type="text" id="newSite" placeholder="ex: github.com" />
            </label>
            <label class="label">
              Identifiant
              <input type="text" id="newLogin" placeholder="ex: mon@email.com" />
            </label>
            <label class="label">
              Mot de passe
              <input type="password" id="newPass" placeholder="••••••••" />
            </label>
          </div>
          <div class="row">
            <button id="addBtn">Ajouter</button>
          </div>
          <ul class="list" id="passwordList"></ul>
        </section>
      </div>
    </div>

    <footer class="footer muted">Objectif: UI/UX.</footer>
  </div>

  <!-- 1) REQUIRED: html2canvas -->
  <script src="./html2canvas.min.js" defer></script>

  <!-- 2) liquidGL (local) -->
  <script src="./liquidGL.js" defer></script>

  <!-- 3) ton app -->
  <script src="./app.js" defer></script>

  <!-- 4) init liquidGL -->
  <script defer>
    window.addEventListener("DOMContentLoaded", () => {
      // initialise sur tous les .liquidGL
      liquidGL({
        target: ".liquidGL",
        snapshot: "body",
        resolution: 2,
        refraction: 0.012,
        bevelDepth: 0.08,
        bevelWidth: 0.12,
        frost: 2,
        shadow: true,
        specular: true,
        reveal: "fade",
        tilt: false
      });
    });
  </script>
</body>
</html>
