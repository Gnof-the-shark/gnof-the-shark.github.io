<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma liste de tâches</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Ma liste de tâches</h1>
      <p class="muted">Connectez-vous pour accéder à vos tâches.</p>
    </header>

    <!-- Carte connexion -->
    <div class="liquidGL">
      <div class="content">
        <section class="card" id="loginCard">
          <h2 style="margin:0 0 4px">Connexion</h2>
          <p class="muted" style="margin:0 0 16px;font-size:13px">Accédez à votre liste de tâches.</p>
          <label class="label">
            Adresse e-mail
            <input type="email" id="loginEmail" placeholder="exemple@domaine.com" autocomplete="email" />
          </label>
          <label class="label">
            Mot de passe
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
          </label>
          <div id="loginError" class="status" style="display:none;border-color:rgba(255,59,107,.35);background:rgba(255,59,107,.10);color:rgba(255,180,180,.9);"></div>
          <div class="row">
            <button id="loginBtn">Se connecter</button>
          </div>
        </section>
      </div>
    </div>

    <!-- Carte todo list -->
    <div class="liquidGL">
      <div class="content">
        <section class="card hidden" id="appCard">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h2 style="margin:0">Mes tâches</h2>
            <div style="display:flex;gap:6px;align-items:center;">
              <button class="secondary icon-btn" id="importBtn" title="Importer un fichier JSON">⬆ Importer</button>
              <button class="secondary icon-btn" id="exportBtn" title="Télécharger en JSON">⬇ Exporter</button>
              <button class="secondary icon-btn" id="logoutBtn" style="font-size:13px;padding:7px 14px;">Déconnexion</button>
            </div>
          </div>
          <!-- Input fichier caché, déclenché par le bouton Importer -->
          <input type="file" id="importFile" accept=".json,application/json" style="display:none;" />
          <div class="row" style="margin-top:0;">
            <input type="text" id="newTodo" placeholder="Nouvelle tâche…" style="flex:1;min-width:0;" />
            <button id="addBtn">+ Ajouter</button>
          </div>
          <ul class="list" id="todoList"></ul>
        </section>
      </div>
    </div>

    <footer class="footer muted">Les tâches sont sauvegardées automatiquement.</footer>
  </div>

  <!-- 1) REQUIRED: html2canvas -->
  <script src="./html2canvas.min.js" defer></script>

  <!-- 2) liquidGL (local) -->
  <script src="./liquidGL.js" defer></script>

  <!-- 3) app -->
  <script src="./app.js" defer></script>

  <!-- 4) init liquidGL — paramètres iOS 26 Liquid Glass -->
  <script defer>
    window.addEventListener("DOMContentLoaded", () => {
      liquidGL({
        target: ".liquidGL",
        snapshot: "body",
        resolution: 2,
        refraction: 0.04,
        bevelDepth: 0.24,
        bevelWidth: 0.20,
        frost: 8,
        shadow: false,
        specular: true,
        reveal: "fade",
        tilt: true,
        tiltFactor: 8
      });
    });
  </script>
</body>
</html>
