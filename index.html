<!-- ... garde ton head ... -->
<body>
  <div class="container">
    <header class="header">
      <h1>Démo — Gestionnaire de mots de passe</h1>
      <p class="muted">Ceci est une démo UI. Données factices.</p>
    </header>

    <!-- Target (glassified) -->
    <div class="liquidGL">
      <!-- Content (excluded from lens) -->
      <div class="content">
        <section class="card" id="loginCard">
          <!-- ... ton contenu login ... -->
        </section>
      </div>
    </div>

    <div class="liquidGL">
      <div class="content">
        <section class="card hidden" id="appCard">
          <!-- ... ton contenu app ... -->
        </section>
      </div>
    </div>

    <footer class="footer muted">Objectif: UI/UX.</footer>
  </div>

  <!-- 1) REQUIRED: html2canvas -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
    defer
  ></script>

  <!-- 2) liquidGL (local) -->
  <script src="./scripts/liquidGL.js" defer></script>

  <!-- 3) ton app -->
  <script src="./app.js" defer></script>

  <!-- 4) init liquidGL -->
  <script defer>
    window.addEventListener("DOMContentLoaded", () => {
      // initialise sur tous les .liquidGL
      liquidGL({
        target: ".liquidGL",
        snapshot: "body",
        resolution: 2,
        refraction: 0.012,
        bevelDepth: 0.08,
        bevelWidth: 0.12,
        frost: 2,
        shadow: true,
        specular: true,
        reveal: "fade",
        tilt: false
      });
    });
  </script>
</body>
